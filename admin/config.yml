backend:
  name: github
  repo: chinte888/wulai-spa-site
  branch: main
base_url: https://wulai-cms-auth.chinte880401jerry.workers.dev
auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "最新消息"
    label_singular: "消息"
    files:
      - name: "news_list"
        label: "消息列表"
        file: "content/news.json"
        fields:
          - label: "消息列表"
            name: "items"
            widget: "list"
            label_singular: "一則消息"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - {label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
              - {label: "標題 (中)", name: "title", widget: "string"}
              - {label: "標題 (英)", name: "title_en", widget: "string", required: false}
              - {label: "標題 (日)", name: "title_ja", widget: "string", required: false}
              - {label: "標題 (韓)", name: "title_ko", widget: "string", required: false}
              - {label: "內容 (中)", name: "body", widget: "text"}
              - {label: "內容 (英)", name: "body_en", widget: "text", required: false}
              - {label: "內容 (日)", name: "body_ja", widget: "text", required: false}
              - {label: "內容 (韓)", name: "body_ko", widget: "text", required: false}
